services:
  php:
    build: ./docker/php
    restart: unless-stopped
    container_name: mmenu.php    
    tty: true
    expose:
      - ${PROD_PHP_EXPOSE}
    environment:
      - TZ=UTC
    depends_on:
      - db
    volumes:
      - ./:/var/www
    networks:
          - mmenu-network
  apache:
    build: ./docker/apache
    restart: unless-stopped
    container_name: mmenu.apache
    tty: true
    depends_on:
      - php
    ports:
      - ${PROD_APACHE_HTTP}:80
    environment:
      - TZ=UTC
      - VIRTUAL_HOST=${PROD_WWWROOT}      
    volumes:
      - ./app:/var/www/app
    networks:
          - mmenu-network      

  db:
    image: mariadb:lts-ubi9
    container_name: mmenu.mariadb    
    restart: always    
    ports:
      - ${PROD_DB_EXPOSE}:3306    
    environment:
      - TZ=UTC
      - MARIADB_ROOT_PASSWORD=${PROD_DBPASS}
      - HOSTNAME=localhost
    command: --innodb-buffer-pool-size=128M
    volumes:
      - ./db:/var/lib/mysql 
      - ./docker/mysql/mariadb.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
          - mmenu-network      

  adminer:
    image: adminer:5.3.0
    container_name: mmenu.adminer    
    restart: always
    ports:
      - ${PROD_ADMINER_EXPOSE}:8080
    environment:
      - TZ=UTC 
    networks:
          - mmenu-network           

networks:
  mmenu-network:
    driver: bridge
    name: mmenu-network