services:
  mmenu-php:
    build: ./docker/php
    restart: unless-stopped    
    tty: true
    expose:
      - ${LOCAL_PHP_EXPOSE}
    environment:
      - TZ=UTC      
    depends_on:
      - mmenu-db
    volumes:
      - ./:/var/www
    networks:
      - default              # Внутренняя сеть проекта (с db, adminer)
      - shared-app-network   # Общая сеть для связи с другими проектами

  mmenu-apache:
    build: ./docker/apache
    restart: unless-stopped    
    tty: true
    depends_on:
      - mmenu-php
    ports:
      - ${LOCAL_APACHE_HTTP}:80      
    environment:        
      - TZ=UTC      
      - VIRTUAL_HOST=${LOCAL_WWWROOT}
    volumes:
      - ./app:/var/www/app  
    networks:
      - default
      - shared-app-network

  mmenu-db:
    image: mariadb:lts-ubi9    
    restart: always    
    ports:
      - ${LOCAL_DB_EXPOSE}:3306    
    environment:
      - TZ=UTC          
      - MARIADB_ROOT_PASSWORD=${LOCAL_DBPASS}
      - HOSTNAME=localhost
    volumes:
      - ./db:/var/lib/mysql 
      - ./docker/mysql/mariadb.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - default              # Только внутренняя сеть — изоляция от внешних проектов

  mmenu-adminer:
    image: adminer:5.3.0    
    restart: always
    ports:
      - ${LOCAL_ADMINER_EXPOSE}:8080
    environment:
      - TZ=UTC        
    networks:
      - default              # Только внутренняя сеть

networks:
  # default — создаётся автоматически Docker Compose, 
  # имя будет с префиксом проекта: <имя-папки>_default
  shared-app-network:
    external: true           
